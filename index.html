<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Black Wing Commission Calendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0d0f12;
    --surface:   #141720;
    --surface2:  #1c2030;
    --border:    rgba(255,255,255,0.07);
    --border2:   rgba(255,255,255,0.13);
    --text:      #e8eaf0;
    --muted:     #6b7385;
    --dimmer:    #3d4356;

    --trans:     #e07b3a;
    --trans-bg:  rgba(224,123,58,0.12);
    --trans-bdr: rgba(224,123,58,0.3);
    --trans-text:#f5a96a;

    --ethos:     #4caf82;
    --ethos-bg:  rgba(76,175,130,0.12);
    --ethos-bdr: rgba(76,175,130,0.3);
    --ethos-text:#7dd4a8;

    --mutual:     #a78bfa;
    --mutual-bg:  rgba(167,139,250,0.12);
    --mutual-bdr: rgba(167,139,250,0.3);
    --mutual-text:#c4b5fd;

    --gold:      #e8c84a;
    --gold-bg:   rgba(232,200,74,0.12);

    --accent:    #5b7cf6;
    --weekend:   #0f1118;

    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  .logo-icon {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .status-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    color: var(--muted);
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--ethos);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100%{opacity:1} 50%{opacity:0.4}
  }
  .status-dot.loading { background: var(--gold); }
  .status-dot.error   { background: #e05555; animation: none; }
  #last-updated { font-size: 11px; color: var(--muted); }

  /* ── MAIN LAYOUT ── */
  main { max-width: 1200px; margin: 0 auto; padding: 28px 24px 60px; }

  /* ── SUMMARY CARDS ── */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }
  @media (max-width: 640px) { .summary-grid { grid-template-columns: 1fr; } }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 18px 20px;
    transition: border-color 0.15s;
  }
  .card:hover { border-color: var(--border2); }
  .card-label {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .card-value {
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.03em;
    line-height: 1;
  }
  .card-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 5px;
  }
  .card.trans  { border-left: 3px solid var(--trans); }
  .card.ethos  { border-left: 3px solid var(--ethos); }
  .card.mutual { border-left: 3px solid var(--mutual); }
  .card.total  { border-left: 3px solid var(--accent); }
  .card.trans  .card-value { color: var(--trans-text); }
  .card.ethos  .card-value { color: var(--ethos-text); }
  .card.mutual .card-value { color: var(--mutual-text); }
  .card.total  .card-value { color: #a5b4fc; }

  /* ── CALENDAR NAV ── */
  .cal-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .cal-title {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.03em;
  }
  .nav-controls { display: flex; gap: 8px; align-items: center; }
  .nav-btn {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text);
    padding: 6px 14px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .nav-btn:hover { background: var(--surface2); border-color: var(--dimmer); }
  .today-btn {
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--muted);
    padding: 6px 12px;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
  }
  .today-btn:hover { color: var(--text); border-color: var(--dimmer); }

  /* ── LEGEND ── */
  .legend {
    display: flex;
    gap: 18px;
    margin-bottom: 14px;
    flex-wrap: wrap;
    align-items: center;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--muted);
  }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .legend-shifted {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--gold);
    flex-shrink: 0;
  }

  /* ── CALENDAR GRID ── */
  .day-headers {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
    margin-bottom: 3px;
  }
  .day-header {
    text-align: center;
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    padding: 6px 0;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .cal-grid { display: flex; flex-direction: column; gap: 3px; }
  .cal-week { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }

  .cal-cell {
    min-height: 84px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 7px 8px;
    cursor: default;
    transition: border-color 0.15s, background 0.15s;
    overflow: hidden;
    position: relative;
  }
  .cal-cell.other-month {
    background: var(--bg);
    border-color: rgba(255,255,255,0.03);
    opacity: 0.4;
  }
  .cal-cell.weekend {
    background: var(--weekend);
  }
  .cal-cell.today {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent) inset;
  }
  .cal-cell.has-payment {
    cursor: pointer;
  }
  .cal-cell.has-payment:hover {
    border-color: var(--border2);
    background: var(--surface2);
  }
  .cal-cell.has-payment.today:hover {
    border-color: var(--accent);
  }

  .cell-date {
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 5px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .today .cell-date { color: var(--accent); }
  .today-badge {
    font-size: 9px;
    background: var(--accent);
    color: white;
    border-radius: 10px;
    padding: 1px 6px;
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .shifted-indicator {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--gold);
    flex-shrink: 0;
  }

  .pill {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    border-radius: 4px;
    padding: 2px 6px;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: block;
  }
  .pill-trans  { background: var(--trans-bg);  color: var(--trans-text);  border: 1px solid var(--trans-bdr);  }
  .pill-ethos  { background: var(--ethos-bg);  color: var(--ethos-text);  border: 1px solid var(--ethos-bdr);  }
  .pill-mutual { background: var(--mutual-bg); color: var(--mutual-text); border: 1px solid var(--mutual-bdr); }

  /* ── DETAIL PANEL ── */
  .detail-panel {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius-lg);
    padding: 24px;
    margin-top: 16px;
    display: none;
    animation: slideIn 0.18s ease;
  }
  .detail-panel.open { display: block; }
  @keyframes slideIn {
    from { opacity:0; transform: translateY(-6px); }
    to   { opacity:1; transform: translateY(0); }
  }
  .detail-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
  }
  .detail-title {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  .detail-subtitle {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }
  .close-btn {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--muted);
    width: 28px; height: 28px;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .close-btn:hover { color: var(--text); border-color: var(--dimmer); }

  .detail-cards {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .detail-card {
    flex: 1;
    min-width: 110px;
    border-radius: var(--radius-md);
    padding: 12px 14px;
    border: 1px solid transparent;
  }
  .detail-card.trans    { background: var(--trans-bg);   border-color: var(--trans-bdr);   }
  .detail-card.ethos    { background: var(--ethos-bg);   border-color: var(--ethos-bdr);   }
  .detail-card.mutual   { background: var(--mutual-bg);  border-color: var(--mutual-bdr);  }
  .detail-card.combined { background: var(--surface2);   border-color: var(--border2);     }
  .dc-label { font-size: 11px; font-weight: 500; margin-bottom: 4px; }
  .dc-label.trans    { color: var(--trans-text);   }
  .dc-label.ethos    { color: var(--ethos-text);   }
  .dc-label.mutual   { color: var(--mutual-text);  }
  .dc-label.combined { color: var(--muted);        }
  .dc-amount { font-size: 18px; font-weight: 600; font-family: 'DM Mono', monospace; }
  .dc-amount.trans    { color: var(--trans-text);  }
  .dc-amount.ethos    { color: var(--ethos-text);  }
  .dc-amount.mutual   { color: var(--mutual-text); }
  .dc-amount.combined { color: var(--text);        }
  .dc-count { font-size: 11px; color: var(--muted); margin-top: 3px; }

  .shifted-banner {
    background: var(--gold-bg);
    border: 1px solid rgba(232,200,74,0.25);
    border-radius: var(--radius-sm);
    padding: 8px 12px;
    font-size: 12px;
    color: #e8c84a;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ── TABLE ── */
  .table-wrap { overflow-x: auto; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    min-width: 480px;
  }
  thead th {
    text-align: left;
    padding: 8px 12px;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--muted);
    border-bottom: 1px solid var(--border2);
  }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }
  td { padding: 9px 12px; color: var(--text); }
  td.mono { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }
  td.amount { text-align: right; font-family: 'DM Mono', monospace; font-weight: 500; }
  .badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.04em;
    padding: 2px 7px;
    border-radius: 4px;
  }
  .badge-trans  { background: var(--trans-bg);   color: var(--trans-text);   border: 1px solid var(--trans-bdr);   }
  .badge-ethos  { background: var(--ethos-bg);   color: var(--ethos-text);   border: 1px solid var(--ethos-bdr);   }
  .badge-mutual { background: var(--mutual-bg);  color: var(--mutual-text);  border: 1px solid var(--mutual-bdr);  }

  /* ── LOADING / ERROR STATES ── */
  .state-overlay {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }
  .state-overlay h2 { font-size: 16px; font-weight: 500; margin-bottom: 8px; color: var(--text); }
  .state-overlay p  { font-size: 13px; line-height: 1.6; max-width: 400px; margin: 0 auto; }
  .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .setup-box {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius-lg);
    padding: 32px;
    max-width: 560px;
    margin: 0 auto;
    text-align: left;
  }
  .setup-box h2 { font-size: 18px; font-weight: 600; margin-bottom: 12px; }
  .setup-box ol { padding-left: 20px; }
  .setup-box li { margin-bottom: 10px; font-size: 13px; color: var(--muted); line-height: 1.6; }
  .setup-box li strong { color: var(--text); }
  .setup-box code {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 4px;
    padding: 1px 6px;
    color: var(--ethos-text);
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    header { padding: 0 16px; }
    main { padding: 16px 12px 60px; }
    .cal-cell { min-height: 64px; padding: 5px 5px; }
    .pill { font-size: 9px; padding: 1px 4px; }
    .cell-date { font-size: 11px; }
    .summary-grid { grid-template-columns: 1fr 1fr; }
  }
  @media (max-width: 480px) {
    .summary-grid { grid-template-columns: 1fr; }
    .cal-title { font-size: 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🖤</div>
    Black Wing Commission Calendar
  </div>
  <div class="header-right">
    <span id="last-updated"></span>
    <div class="status-pill">
      <div class="status-dot loading" id="status-dot"></div>
      <span id="status-text">Loading…</span>
    </div>
  </div>
</header>

<main>
  <div id="app-content">
    <div class="state-overlay">
      <div class="spinner"></div>
      <h2>Loading commission data…</h2>
      <p>Fetching from your Google Sheet.</p>
    </div>
  </div>
</main>

<!-- Detail panel (outside main flow so it doesn't shift layout) -->
<div id="detail-panel" class="detail-panel">
  <div class="detail-header">
    <div>
      <div class="detail-title" id="detail-title"></div>
      <div class="detail-subtitle" id="detail-subtitle"></div>
    </div>
    <button class="close-btn" id="close-btn">✕</button>
  </div>
  <div id="shifted-banner" class="shifted-banner" style="display:none">
    <span>⚠</span>
    <span>Some policies were originally due on a weekend and rolled to this Monday.</span>
  </div>
  <div class="detail-cards" id="detail-cards"></div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Agent</th>
          <th>Policy #</th>
          <th>Provider</th>
          <th style="text-align:right">Annual Premium</th>
        </tr>
      </thead>
      <tbody id="detail-tbody"></tbody>
    </table>
  </div>
</div>

<script src="config.js"></script>
<script>
// ─── UTILS ────────────────────────────────────────
const $ = id => document.getElementById(id);
const fmt = v => '$' + Number(v).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function parseDate(val) {
  if (!val || val.toString().trim() === '') return null;
  try {
    const s = val.toString().trim();
    // Try MM/DD/YYYY
    let m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
    if (m) return new Date(+m[3], +m[1]-1, +m[2]);
    // Try YYYY-MM-DD
    m = s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})$/);
    if (m) return new Date(+m[1], +m[2]-1, +m[3]);
    // Try "May 1, 2026" style
    const d = new Date(s);
    if (!isNaN(d.getTime())) return d;
    return null;
  } catch { return null; }
}

function cleanPremium(val) {
  if (val === null || val === undefined || val === '') return 0;
  const n = parseFloat(val.toString().replace(/[$,]/g, '').trim());
  return isNaN(n) ? 0 : n;
}

function normalizeProvider(val) {
  if (!val) return null;
  const s = val.toString().trim().toLowerCase();
  if (['ethos','ethis','trustage','giwl'].some(k => s.includes(k))) return 'Ethos';
  if (s.includes('trans')) return 'Trans';
  if (['moo','mutual'].some(k => s.includes(k))) return 'Mutual';
  return null;
}

function toBusinessDay(date) {
  const d = new Date(date);
  const dow = d.getDay();
  if (dow === 6) d.setDate(d.getDate() + 2); // Sat → Mon
  if (dow === 0) d.setDate(d.getDate() + 1); // Sun → Mon
  return d;
}

function dateKey(date) {
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
}

function addDays(date, n) {
  const d = new Date(date);
  d.setDate(d.getDate() + n);
  return d;
}

// ─── DATA PROCESSING ──────────────────────────────
function addBusinessDays(date, n) {
  const d = new Date(date);
  let added = 0;
  while (added < n) {
    d.setDate(d.getDate() + 1);
    if (d.getDay() !== 0 && d.getDay() !== 6) added++;
  }
  return d;
}

function processRows(rows) {
  const C = CONFIG.COLUMNS;
  const paymentMap = {};

  for (const row of rows) {
    const provider = normalizeProvider(row[C.provider]);
    if (!provider) continue;

    const effDate = parseDate(row[C.effectiveDate]);
    if (!effDate) continue;

    const premium = cleanPremium(row[C.annualPremium]);
    if (premium <= 0) continue;

    const bizDays = provider === 'Trans'   ? CONFIG.TRANS_BIZ_DAYS
                  : provider === 'Ethos'   ? CONFIG.ETHOS_BIZ_DAYS
                  : CONFIG.MUTUAL_BIZ_DAYS;

    const payDate = addBusinessDays(effDate, bizDays);
    const key = dateKey(payDate);

    if (!paymentMap[key]) paymentMap[key] = {};
    if (!paymentMap[key][provider]) {
      paymentMap[key][provider] = { total: 0, count: 0, policies: [] };
    }

    paymentMap[key][provider].total += premium;
    paymentMap[key][provider].count++;
    paymentMap[key][provider].policies.push({
      agent:  row[C.agentName]    || '—',
      policy: row[C.policyNumber] || '—',
      premium,
      provider,
    });
  }

  for (const day of Object.values(paymentMap)) {
    for (const p of Object.values(day)) {
      p.total = Math.round(p.total * 100) / 100;
    }
  }
  return paymentMap;
}

// ─── GOOGLE SHEET FETCH ───────────────────────────
async function fetchSheetData() {
  const url = CONFIG.SHEET_URL;
  if (!url || url === 'YOUR_GOOGLE_SHEET_CSV_URL_HERE') {
    return { error: 'setup' };
  }
  try {
    const res = await fetch(url + (url.includes('?') ? '&' : '?') + 'cachebust=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    const rows = parseCSV(text);
    return { rows };
  } catch (e) {
    return { error: e.message };
  }
}

function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (lines.length < 2) return [];
  const headers = splitCSVLine(lines[0]);
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const vals = splitCSVLine(lines[i]);
    const obj = {};
    headers.forEach((h, idx) => { obj[h.trim()] = (vals[idx] || '').trim(); });
    rows.push(obj);
  }
  return rows;
}

function splitCSVLine(line) {
  const result = [];
  let cur = '', inQuote = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { inQuote = !inQuote; }
    else if (ch === ',' && !inQuote) { result.push(cur); cur = ''; }
    else { cur += ch; }
  }
  result.push(cur);
  return result;
}

// ─── CALENDAR STATE ───────────────────────────────
let calYear, calMonth, paymentData = {};

function initCalendar() {
  const now = new Date();
  calYear = now.getFullYear();
  calMonth = now.getMonth();
}

// ─── RENDER ───────────────────────────────────────
function renderSummary() {
  let tTotal = 0, eTotal = 0, mTotal = 0, tCount = 0, eCount = 0, mCount = 0;
  for (const day of Object.values(paymentData)) {
    if (day.Trans)  { tTotal += day.Trans.total;  tCount += day.Trans.count;  }
    if (day.Ethos)  { eTotal += day.Ethos.total;  eCount += day.Ethos.count;  }
    if (day.Mutual) { mTotal += day.Mutual.total; mCount += day.Mutual.count; }
  }
  const total = tTotal + eTotal + mTotal;

  return `
    <div class="summary-grid" style="grid-template-columns:repeat(4,1fr)">
      <div class="card total">
        <div class="card-label">Total AP projected</div>
        <div class="card-value">${fmt(total)}</div>
        <div class="card-sub">${tCount + eCount + mCount} policies · all carriers</div>
      </div>
      <div class="card trans">
        <div class="card-label">Transamerica</div>
        <div class="card-value">${fmt(tTotal)}</div>
        <div class="card-sub">${tCount} polic${tCount !== 1 ? 'ies' : 'y'} · eff +6 biz days</div>
      </div>
      <div class="card ethos">
        <div class="card-label">Ethos / Trustage</div>
        <div class="card-value">${fmt(eTotal)}</div>
        <div class="card-sub">${eCount} polic${eCount !== 1 ? 'ies' : 'y'} · eff +10 biz days</div>
      </div>
      <div class="card mutual">
        <div class="card-label">Mutual of Omaha</div>
        <div class="card-value">${fmt(mTotal)}</div>
        <div class="card-sub">${mCount} polic${mCount !== 1 ? 'ies' : 'y'} · eff +8 biz days</div>
      </div>
    </div>`;
}

function renderCalendar() {
  const today = new Date();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const firstDow = new Date(calYear, calMonth, 1).getDay();
  const prevMonthDays = new Date(calYear, calMonth, 0).getDate();

  let html = `
    <div class="cal-nav">
      <div class="cal-title">${MONTHS[calMonth]} ${calYear}</div>
      <div class="nav-controls">
        <button class="today-btn" onclick="goToday()">Today</button>
        <button class="nav-btn" onclick="prevMonth()">←</button>
        <button class="nav-btn" onclick="nextMonth()">→</button>
      </div>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--trans)"></div>Transamerica (eff +7 biz days)</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--ethos)"></div>Ethos / Trustage (eff +13 biz days)</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--mutual)"></div>Mutual of Omaha (eff +10 biz days)</div>
    </div>
    <div class="day-headers">
      ${DAYS_SHORT.map(d => `<div class="day-header">${d}</div>`).join('')}
    </div>
    <div class="cal-grid" id="cal-grid">`;

  let weekHtml = '<div class="cal-week">';
  let cellCount = 0;

  // Prev month filler cells
  for (let i = 0; i < firstDow; i++) {
    weekHtml += `<div class="cal-cell other-month"><div class="cell-date">${prevMonthDays - firstDow + 1 + i}</div></div>`;
    cellCount++;
  }

  // Current month
  for (let d = 1; d <= daysInMonth; d++) {
    const key = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayData = paymentData[key];
    const isToday = today.getFullYear() === calYear && today.getMonth() === calMonth && today.getDate() === d;
    const dow = new Date(calYear, calMonth, d).getDay();
    const isWeekend = dow === 0 || dow === 6;
    const hasPayment = !!dayData;
    const isShifted = hasPayment && ((dayData.Trans && dayData.Trans.shifted) || (dayData.Ethos && dayData.Ethos.shifted));

    let cls = 'cal-cell';
    if (isWeekend) cls += ' weekend';
    if (isToday) cls += ' today';
    if (hasPayment) cls += ' has-payment';

    const onclick = hasPayment ? `onclick="showDetail('${key}', ${d})"` : '';

    let innerHtml = `<div class="cell-date">
      <span>${d}</span>
      ${isToday ? '<span class="today-badge">TODAY</span>' : ''}
      ${isShifted && !isToday ? '<span class="shifted-indicator"></span>' : ''}
    </div>`;

    if (dayData) {
      if (dayData.Trans) {
        const lbl = dayData.Trans.count > 1
          ? `T: ${fmt(dayData.Trans.total)} (${dayData.Trans.count})`
          : `T: ${fmt(dayData.Trans.total)}`;
        innerHtml += `<div class="pill pill-trans">${lbl}</div>`;
      }
      if (dayData.Ethos) {
        const lbl = dayData.Ethos.count > 1
          ? `E: ${fmt(dayData.Ethos.total)} (${dayData.Ethos.count})`
          : `E: ${fmt(dayData.Ethos.total)}`;
        innerHtml += `<div class="pill pill-ethos">${lbl}</div>`;
      }
      if (dayData.Mutual) {
        const lbl = dayData.Mutual.count > 1
          ? `M: ${fmt(dayData.Mutual.total)} (${dayData.Mutual.count})`
          : `M: ${fmt(dayData.Mutual.total)}`;
        innerHtml += `<div class="pill pill-mutual">${lbl}</div>`;
      }
    }

    weekHtml += `<div class="${cls}" ${onclick}>${innerHtml}</div>`;
    cellCount++;

    if (cellCount % 7 === 0 && d < daysInMonth) {
      html += weekHtml + '</div>';
      weekHtml = '<div class="cal-week">';
    }
  }

  // Next month filler
  const remaining = 7 - (cellCount % 7 === 0 ? 7 : cellCount % 7);
  if (remaining < 7) {
    for (let i = 1; i <= remaining; i++) {
      weekHtml += `<div class="cal-cell other-month"><div class="cell-date">${i}</div></div>`;
    }
  }
  html += weekHtml + '</div></div>';
  return html;
}

function renderApp() {
  $('app-content').innerHTML = renderSummary() + renderCalendar();
}

// ─── DETAIL PANEL ────────────────────────────────
function showDetail(key, day) {
  const d = paymentData[key];
  if (!d) return;

  const [y, m] = key.split('-').map(Number);
  $('detail-title').textContent = `${MONTHS[m-1]} ${day}, ${y}`;

  const tTotal = d.Trans  ? d.Trans.total  : 0;
  const eTotal = d.Ethos  ? d.Ethos.total  : 0;
  const mTotal = d.Mutual ? d.Mutual.total : 0;
  const combined = tTotal + eTotal + mTotal;
  const isShifted = (d.Trans && d.Trans.shifted) || (d.Ethos && d.Ethos.shifted) || (d.Mutual && d.Mutual.shifted);

  $('detail-subtitle').textContent = `${(d.Trans ? d.Trans.count : 0) + (d.Ethos ? d.Ethos.count : 0) + (d.Mutual ? d.Mutual.count : 0)} policies · ${fmt(combined)} total`;
  $('shifted-banner').style.display = isShifted ? 'flex' : 'none';

  let cards = '';
  if (d.Trans) {
    cards += `<div class="detail-card trans">
      <div class="dc-label trans">Transamerica</div>
      <div class="dc-amount trans">${fmt(tTotal)}</div>
      <div class="dc-count">${d.Trans.count} polic${d.Trans.count > 1 ? 'ies' : 'y'}</div>
    </div>`;
  }
  if (d.Ethos) {
    cards += `<div class="detail-card ethos">
      <div class="dc-label ethos">Ethos / Trustage</div>
      <div class="dc-amount ethos">${fmt(eTotal)}</div>
      <div class="dc-count">${d.Ethos.count} polic${d.Ethos.count > 1 ? 'ies' : 'y'}</div>
    </div>`;
  }
  if (d.Mutual) {
    cards += `<div class="detail-card mutual">
      <div class="dc-label mutual">Mutual of Omaha</div>
      <div class="dc-amount mutual">${fmt(mTotal)}</div>
      <div class="dc-count">${d.Mutual.count} polic${d.Mutual.count > 1 ? 'ies' : 'y'}</div>
    </div>`;
  }
  const numCarriers = (d.Trans ? 1 : 0) + (d.Ethos ? 1 : 0) + (d.Mutual ? 1 : 0);
  if (numCarriers > 1) {
    cards += `<div class="detail-card combined">
      <div class="dc-label combined">Combined</div>
      <div class="dc-amount combined">${fmt(combined)}</div>
      <div class="dc-count">all policies</div>
    </div>`;
  }
  $('detail-cards').innerHTML = cards;

  let rows = '';
  const renderPolicies = (policies, prov) => {
    for (const p of policies) {
      const badgeCls = prov === 'Trans' ? 'badge-trans' : prov === 'Ethos' ? 'badge-ethos' : 'badge-mutual';
      const badgeLbl = prov === 'Trans' ? 'Trans' : prov === 'Ethos' ? 'Ethos' : 'Mutual';
      rows += `<tr>
        <td>${p.agent}</td>
        <td class="mono">${p.policy}</td>
        <td><span class="badge ${badgeCls}">${badgeLbl}</span></td>
        <td class="amount">${fmt(p.premium)}</td>
      </tr>`;
    }
  };
  if (d.Trans)  renderPolicies(d.Trans.policies,  'Trans');
  if (d.Ethos)  renderPolicies(d.Ethos.policies,  'Ethos');
  if (d.Mutual) renderPolicies(d.Mutual.policies, 'Mutual');
  $('detail-tbody').innerHTML = rows;

  const panel = $('detail-panel');
  // Append to main if not already there
  if (!panel.parentElement.classList.contains('main-inner')) {
    document.querySelector('main').appendChild(panel);
  }
  panel.classList.add('open');
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

$('close-btn').addEventListener('click', () => $('detail-panel').classList.remove('open'));

// ─── NAV ─────────────────────────────────────────
function prevMonth() {
  calMonth--;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  $('detail-panel').classList.remove('open');
  renderApp();
}
function nextMonth() {
  calMonth++;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  $('detail-panel').classList.remove('open');
  renderApp();
}
function goToday() {
  const now = new Date();
  calYear = now.getFullYear();
  calMonth = now.getMonth();
  $('detail-panel').classList.remove('open');
  renderApp();
}

// ─── STATUS ───────────────────────────────────────
function setStatus(state, text) {
  const dot = $('status-dot');
  dot.className = 'status-dot ' + (state === 'live' ? '' : state);
  $('status-text').textContent = text;
}

function setLastUpdated() {
  const now = new Date();
  $('last-updated').textContent = 'Updated ' + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

// ─── SETUP SCREEN ────────────────────────────────
function showSetupScreen() {
  $('app-content').innerHTML = `
    <div class="state-overlay">
      <div class="setup-box">
        <h2>Connect your Google Sheet</h2>
        <p style="color:var(--muted);font-size:13px;margin-bottom:16px">Follow these steps to go live:</p>
        <ol>
          <li><strong>Open your policy Google Sheet</strong> in a browser.</li>
          <li>Go to <strong>File → Share → Publish to web</strong>.</li>
          <li>Select your sheet tab, choose <strong>Comma-separated values (.csv)</strong>, and click <strong>Publish</strong>.</li>
          <li>Copy the URL shown.</li>
          <li>Open <code>config.js</code> in this repo and paste it as the value of <code>SHEET_URL</code>.</li>
          <li><strong>Commit and push</strong> — the calendar will refresh automatically.</li>
        </ol>
        <p style="margin-top:16px;font-size:12px;color:var(--muted)">
          Make sure your sheet has columns named: <code>Insurance Provider</code>, <code>Effective Date</code>, <code>Annual Premium</code>, <code>Agent Name</code>, <code>Policy Number</code>.
        </p>
      </div>
    </div>`;
}

// ─── BOOT ────────────────────────────────────────
async function load() {
  setStatus('loading', 'Loading…');
  const result = await fetchSheetData();

  if (result.error === 'setup') {
    setStatus('error', 'Not connected');
    showSetupScreen();
    return;
  }
  if (result.error) {
    setStatus('error', 'Error loading data');
    $('app-content').innerHTML = `
      <div class="state-overlay">
        <h2>Could not load data</h2>
        <p>Error: ${result.error}<br><br>Make sure your Google Sheet is published to the web as CSV and the URL in <code>config.js</code> is correct.</p>
      </div>`;
    return;
  }

  paymentData = processRows(result.rows);
  setStatus('live', 'Live');
  setLastUpdated();
  renderApp();
}

initCalendar();
load();
// Auto-refresh
setInterval(load, CONFIG.REFRESH_INTERVAL);
</script>
