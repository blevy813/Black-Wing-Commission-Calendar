<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Black Wing Commission Calendar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0d0f12;
    --surface:   #141720;
    --surface2:  #1c2030;
    --border:    rgba(255,255,255,0.07);
    --border2:   rgba(255,255,255,0.13);
    --text:      #e8eaf0;
    --muted:     #6b7385;
    --dimmer:    #3d4356;

    --trans:     #dc2626;
    --trans-bg:  rgba(220,38,38,0.12);
    --trans-bdr: rgba(220,38,38,0.35);
    --trans-text:#f87171;

    --ethos:     #16a34a;
    --ethos-bg:  rgba(22,163,74,0.12);
    --ethos-bdr: rgba(22,163,74,0.35);
    --ethos-text:#4ade80;

    --mutual:     #2563eb;
    --mutual-bg:  rgba(37,99,235,0.12);
    --mutual-bdr: rgba(37,99,235,0.35);
    --mutual-text:#60a5fa;

    --balt:       #db2777;
    --balt-bg:    rgba(219,39,119,0.12);
    --balt-bdr:   rgba(219,39,119,0.35);
    --balt-text:  #f472b6;

    --core:       #ea580c;
    --core-bg:    rgba(234,88,12,0.12);
    --core-bdr:   rgba(234,88,12,0.35);
    --core-text:  #fb923c;

    --gold:      #e8c84a;
    --gold-bg:   rgba(232,200,74,0.12);

    --accent:    #5b7cf6;
    --weekend:   #0f1118;

    --radius-sm: 6px;
    --radius-md: 10px;
    --radius-lg: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  .logo-icon {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .status-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    color: var(--muted);
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--ethos);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100%{opacity:1} 50%{opacity:0.4}
  }
  .status-dot.loading { background: var(--gold); }
  .status-dot.error   { background: #e05555; animation: none; }
  #last-updated { font-size: 11px; color: var(--muted); }

  /* ── MAIN LAYOUT ── */
  main { max-width: 1200px; margin: 0 auto; padding: 0 0 60px; }

  /* ── SUMMARY CARDS ── */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }
  @media (max-width: 640px) { .summary-grid { grid-template-columns: 1fr; } }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 18px 20px;
    transition: border-color 0.15s;
  }
  .card:hover { border-color: var(--border2); }
  .card-label {
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .card-value {
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.03em;
    line-height: 1;
  }
  .card-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 5px;
  }
  .card.trans  { border-left: 3px solid var(--trans); }
  .card.ethos  { border-left: 3px solid var(--ethos); }
  .card.mutual { border-left: 3px solid var(--mutual); }
  .card.total  { border-left: 3px solid var(--accent); }
  .card.trans  .card-value { color: var(--trans-text); }
  .card.ethos  .card-value { color: var(--ethos-text); }
  .card.mutual .card-value { color: var(--mutual-text); }
  .card.total  .card-value { color: #a5b4fc; }
  /* ── CALENDAR NAV ── */
  .cal-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .cal-title {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.03em;
  }
  .nav-controls { display: flex; gap: 8px; align-items: center; }
  .nav-btn {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text);
    padding: 6px 14px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .nav-btn:hover { background: var(--surface2); border-color: var(--dimmer); }
  .range-quick-btn {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text);
    padding: 5px 12px;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
  }
  .range-quick-btn:hover, .range-quick-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .today-btn {
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--muted);
    padding: 6px 12px;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
  }
  .today-btn:hover { color: var(--text); border-color: var(--dimmer); }

  /* ── LEGEND ── */
  .legend {
    display: flex;
    gap: 18px;
    margin-bottom: 14px;
    flex-wrap: wrap;
    align-items: center;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--muted);
  }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
  .legend-shifted {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--gold);
    flex-shrink: 0;
  }

  /* ── CALENDAR GRID ── */
  .day-headers {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
    margin-bottom: 3px;
  }
  .day-header {
    text-align: center;
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    padding: 6px 0;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .cal-grid { display: flex; flex-direction: column; gap: 3px; }
  .cal-week { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }

  .cal-cell {
    min-height: 84px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 7px 8px;
    cursor: default;
    transition: border-color 0.15s, background 0.15s;
    overflow: hidden;
    position: relative;
  }
  .cal-cell.other-month {
    background: var(--bg);
    border-color: rgba(255,255,255,0.03);
    opacity: 0.4;
  }
  .cal-cell.weekend {
    background: var(--weekend);
  }
  .cal-cell.today {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent) inset;
  }
  .cal-cell.has-payment {
    cursor: pointer;
  }
  .cal-cell.has-payment:hover {
    border-color: var(--border2);
    background: var(--surface2);
  }
  .cal-cell.has-payment.today:hover {
    border-color: var(--accent);
  }

  .cell-date {
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 5px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .today .cell-date { color: var(--accent); }
  .today-badge {
    font-size: 9px;
    background: var(--accent);
    color: white;
    border-radius: 10px;
    padding: 1px 6px;
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .shifted-indicator {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--gold);
    flex-shrink: 0;
  }

  .pill {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    border-radius: 4px;
    padding: 2px 6px;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: block;
  }
  .pill-trans  { background: var(--trans-bg);  color: var(--trans-text);  border: 1px solid var(--trans-bdr);  }
  .pill-ethos  { background: var(--ethos-bg);  color: var(--ethos-text);  border: 1px solid var(--ethos-bdr);  }
  .pill-mutual { background: var(--mutual-bg); color: var(--mutual-text); border: 1px solid var(--mutual-bdr); }
  .pill-balt   { background: var(--balt-bg);   color: var(--balt-text);   border: 1px solid var(--balt-bdr);   }
  .pill-core   { background: var(--core-bg);   color: var(--core-text);   border: 1px solid var(--core-bdr);   }

  /* ── DETAIL PANEL ── */
  .detail-panel {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius-lg);
    padding: 24px;
    margin-top: 16px;
    display: none;
    position: relative;
    animation: slideIn 0.18s ease;
  }
  .detail-panel.open { display: block; }
  @keyframes slideIn {
    from { opacity:0; transform: translateY(-6px); }
    to   { opacity:1; transform: translateY(0); }
  }
  .detail-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 16px;
  }
  .detail-title {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  .detail-subtitle {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }
  .close-btn {
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--muted);
    width: 28px; height: 28px;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .close-btn:hover { color: var(--text); border-color: var(--dimmer); }

  .detail-cards {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .detail-card {
    flex: 1;
    min-width: 110px;
    border-radius: var(--radius-md);
    padding: 12px 14px;
    border: 1px solid transparent;
  }
  .detail-card.trans    { background: var(--trans-bg);   border-color: var(--trans-bdr);   }
  .detail-card.ethos    { background: var(--ethos-bg);   border-color: var(--ethos-bdr);   }
  .detail-card.mutual   { background: var(--mutual-bg);  border-color: var(--mutual-bdr);  }
  .detail-card.balt     { background: var(--balt-bg);    border-color: var(--balt-bdr);    }
  .detail-card.core     { background: var(--core-bg);    border-color: var(--core-bdr);    }
  .detail-card.combined { background: var(--surface2);   border-color: var(--border2);     }
  .dc-label { font-size: 11px; font-weight: 500; margin-bottom: 4px; }
  .dc-label.trans    { color: var(--trans-text);   }
  .dc-label.ethos    { color: var(--ethos-text);   }
  .dc-label.mutual   { color: var(--mutual-text);  }
  .dc-label.balt     { color: var(--balt-text);    }
  .dc-label.core     { color: var(--core-text);    }
  .dc-label.combined { color: var(--muted);        }
  .dc-amount { font-size: 18px; font-weight: 600; font-family: 'DM Mono', monospace; }
  .dc-amount.trans    { color: var(--trans-text);  }
  .dc-amount.ethos    { color: var(--ethos-text);  }
  .dc-amount.mutual   { color: var(--mutual-text); }
  .dc-amount.balt     { color: var(--balt-text);   }
  .dc-amount.core     { color: var(--core-text);   }
  .dc-amount.combined { color: var(--text);        }
  .dc-count { font-size: 11px; color: var(--muted); margin-top: 3px; }

  .shifted-banner {
    background: var(--gold-bg);
    border: 1px solid rgba(232,200,74,0.25);
    border-radius: var(--radius-sm);
    padding: 8px 12px;
    font-size: 12px;
    color: #e8c84a;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ── TABLE ── */
  .table-wrap { overflow-x: auto; }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    min-width: 480px;
  }
  thead th {
    text-align: left;
    padding: 8px 12px;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--muted);
    border-bottom: 1px solid var(--border2);
  }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }
  td { padding: 9px 12px; color: var(--text); }
  td.mono { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }
  td.amount { text-align: right; font-family: 'DM Mono', monospace; font-weight: 500; }
  .badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.04em;
    padding: 2px 7px;
    border-radius: 4px;
  }
  .badge-trans  { background: var(--trans-bg);   color: var(--trans-text);   border: 1px solid var(--trans-bdr);   }
  .badge-ethos  { background: var(--ethos-bg);   color: var(--ethos-text);   border: 1px solid var(--ethos-bdr);   }
  .badge-mutual { background: var(--mutual-bg);  color: var(--mutual-text);  border: 1px solid var(--mutual-bdr);  }
  .badge-balt   { background: var(--balt-bg);    color: var(--balt-text);    border: 1px solid var(--balt-bdr);    }
  .badge-core   { background: var(--core-bg);    color: var(--core-text);    border: 1px solid var(--core-bdr);    }

  /* ── TOOLTIPS ── */
  .tip-wrap {
    position: relative; display: inline-block; vertical-align: middle;
  }
  .tip-icon {
    display: inline-flex; align-items: center; justify-content: center;
    width: 15px; height: 15px; border-radius: 50%;
    font-size: 10px; font-weight: 600; cursor: pointer;
    margin-left: 4px; line-height: 1;
  }
  .tip-icon.warn  { color: #fbbf24; background: rgba(251,191,36,0.12); border: 0.5px solid rgba(251,191,36,0.35); }
  .tip-icon.fixed { color: #60a5fa; background: rgba(96,165,250,0.1);  border: 0.5px solid rgba(96,165,250,0.3);  font-size:9px; width:auto; border-radius:3px; padding:0 4px; }
  .tip-icon.warn:hover  { background: rgba(251,191,36,0.25); }
  .tip-icon.fixed:hover { background: rgba(96,165,250,0.2); }
  .tip-box {
    display: none;
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface2, #1c2030);
    border-radius: var(--border-radius-md);
    padding: 7px 11px;
    font-size: 11px;
    white-space: nowrap;
    z-index: 9999;
    pointer-events: none;
    min-width: 160px;
    text-align: center;
  }
  .tip-box.warn  { border: 1px solid rgba(251,191,36,0.4); color: #fbbf24; }
  .tip-box.fixed { border: 1px solid rgba(96,165,250,0.4);  color: #60a5fa; }
  .tip-wrap:hover .tip-box { display: block; }

  .monthly-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--border-radius-lg);
    padding: 20px;
    margin-bottom: 28px;
  }
  .monthly-section h3 {
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .07em;
    margin-bottom: 14px;
  }
  .monthly-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .monthly-table th {
    text-align: right; padding: 6px 10px;
    color: var(--muted); font-weight: 500;
    border-bottom: 1px solid var(--border2);
    white-space: nowrap;
  }
  .monthly-table th:first-child { text-align: left; }
  .monthly-table td {
    text-align: right; padding: 7px 10px;
    border-bottom: 1px solid var(--border);
    font-family: 'DM Mono', monospace; font-size: 11px;
    color: var(--text);
  }
  .monthly-table td:first-child { text-align: left; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; color: var(--text); }
  .monthly-table tr:last-child td { border-bottom: none; }
  .monthly-table tr.total-row td { border-top: 1px solid var(--border2); font-weight: 600; color: #a5b4fc; padding-top: 10px; }
  .monthly-table tr.total-row td:first-child { color: #a5b4fc; }
  /* ── MAIN TABS ── */
  .main-tab {
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    padding: 10px 18px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: -1px;
  }
  .main-tab:hover { color: var(--text); }
  .main-tab.active {
    color: var(--text);
    border-bottom: 2px solid var(--accent);
    font-weight: 500;
  }

  /* ── PAYMENT CALCULATOR ── */
  .calc-card {
    border-radius: var(--border-radius-md);
    padding: 8px 12px;
    min-width: 105px;
    text-align: right;
  }
  .calc-card .cc-lbl { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 3px; }
  .calc-card .cc-val { font-size: 15px; font-weight: 500; font-family: 'DM Mono', monospace; }
  .calc-card .cc-sub { font-size: 10px; margin-top: 2px; opacity: .75; }
  .cc-expected { background: var(--surface2); border: 0.5px solid var(--border2); }
  .cc-expected .cc-lbl, .cc-expected .cc-sub { color: var(--muted); }
  .cc-expected .cc-val { color: var(--text); }
  .cc-today { background: rgba(22,163,74,.08); border: 0.5px solid rgba(22,163,74,.25); }
  .cc-today .cc-lbl, .cc-today .cc-val, .cc-today .cc-sub { color: #4ade80; }
  .cc-prior { background: rgba(96,165,250,.08); border: 0.5px solid rgba(96,165,250,.2); }
  .cc-prior .cc-lbl, .cc-prior .cc-val, .cc-prior .cc-sub { color: #60a5fa; }

  /* ── STATUS TOGGLES ── */
  .status-tog-group{display:flex;border:1px solid var(--border2);border-radius:6px;overflow:hidden;width:fit-content}
  .status-tog{padding:3px 7px;font-size:9px;font-weight:500;cursor:pointer;border:none;border-right:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;white-space:nowrap;transition:all .1s}
  .status-tog:last-child{border-right:none}
  .status-tog:hover{background:var(--surface2);color:var(--text)}
  .status-tog.tog-pending{background:var(--surface2);color:var(--text)}
  .status-tog.tog-paid{background:rgba(22,163,74,.15);color:#4ade80}
  .status-tog.tog-ipf{background:rgba(234,179,8,.15);color:#facc15}
  .status-tog.tog-rapid{background:rgba(251,146,60,.15);color:#fb923c}
  .status-tog.tog-chargeback{background:rgba(220,38,38,.12);color:#f87171}
  .status-tog.tog-cancelled{background:rgba(107,114,128,.1);color:var(--muted)}
  .impact-rapid{font-size:10px;color:#fb923c;background:rgba(251,146,60,.08);border-radius:3px;padding:1px 5px;display:inline-block;margin-top:3px}
  .impact-ipf{font-size:10px;color:#facc15;background:rgba(234,179,8,.08);border-radius:3px;padding:1px 5px;display:inline-block;margin-top:3px}
  .impact-cb{font-size:10px;color:#60a5fa;background:rgba(96,165,250,.08);border-radius:3px;padding:1px 5px;display:inline-block;margin-top:3px}

  .state-overlay {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
  }
  .state-overlay h2 { font-size: 16px; font-weight: 500; margin-bottom: 8px; color: var(--text); }

<script>
// ─── UTILS ────────────────────────────────────────
const $ = id => document.getElementById(id);
const fmt = v => '$' + Number(v).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function parseDate(val) {
  if (!val || val.toString().trim() === '') return null;
  try {
    const s = val.toString().trim();
    // Try MM/DD/YYYY
    let m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
    if (m) return new Date(+m[3], +m[1]-1, +m[2]);
    // Try YYYY-MM-DD
    m = s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})$/);
    if (m) return new Date(+m[1], +m[2]-1, +m[3]);
    // Try "May 1, 2026" style
    const d = new Date(s);
    if (!isNaN(d.getTime())) return d;
    return null;
  } catch { return null; }
}

function cleanPremium(val) {
  if (val === null || val === undefined || val === '') return 0;
  const n = parseFloat(val.toString().replace(/[$,]/g, '').trim());
  return isNaN(n) ? 0 : n;
}

function normalizeProvider(val) {
  if (!val) return null;
  const s = val.toString().trim().toLowerCase();
  if (['ethos','ethis','trustage','giwl'].some(k => s.includes(k))) return 'Ethos';
  if (s.includes('trans')) return 'Trans';
  if (['moo','mutual'].some(k => s.includes(k))) return 'Mutual';
  if (s.includes('baltimore')) return 'Balt';
  if (s.includes('core') || s.includes('corebrige')) return 'Core';
  return null;
}

// Override carrier based on policy number format when unambiguous
function overrideProviderByPolicy(policyRaw, currentProvider) {
  if (!policyRaw) return { provider: currentProvider, corrected: false };
  const p = policyRaw.toString().trim().replace(/\s+/g, '');

  // L + 7 digits → Baltimore Life (e.g. L0086150)
  if (/^L\d{7}$/i.test(p)) return { provider: 'Balt', corrected: currentProvider !== 'Balt' };
  // FEXB prefix → Transamerica
  if (/^FEXB/i.test(p)) return { provider: 'Trans', corrected: currentProvider !== 'Trans' };
  // IULA prefix → Transamerica
  if (/^IULA/i.test(p)) return { provider: 'Trans', corrected: currentProvider !== 'Trans' };
  // PTSN prefix → Ethos
  if (/^PTSN/i.test(p)) return { provider: 'Ethos', corrected: currentProvider !== 'Ethos' };
  // BU prefix → Mutual of Omaha
  if (/^BU/i.test(p)) return { provider: 'Mutual', corrected: currentProvider !== 'Mutual' };
  // All digits ~9-11 chars → Corebridge
  if (/^\d{9,11}$/.test(p)) return { provider: 'Core', corrected: currentProvider !== 'Core' };

  // FEX alone (no B) or anything else — trust the provider field
  return { provider: currentProvider, corrected: false };
}

function toBusinessDay(date) {
  const d = new Date(date);
  const dow = d.getDay();
  if (dow === 6) d.setDate(d.getDate() + 2); // Sat → Mon
  if (dow === 0) d.setDate(d.getDate() + 1); // Sun → Mon
  return d;
}

function dateKey(date) {
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
}

function addDays(date, n) {
  const d = new Date(date);
  d.setDate(d.getDate() + n);
  return d;
}

// For Baltimore Life: find next Wednesday (3) or Saturday (6) on or after date
function toNextWedSat(date) {
  const d = new Date(date);
  const dow = d.getDay();
  if (dow === 3 || dow === 6) return d; // already Wed or Sat
  const daysToWed = (3 - dow + 7) % 7;
  const daysToSat = (6 - dow + 7) % 7;
  const jump = Math.min(daysToWed || 7, daysToSat || 7);
  d.setDate(d.getDate() + jump);
  return d;
}
function getCarrierRate(provider, productRaw) {
  const p = (productRaw || '').toLowerCase().trim();
  let rate = 1.0, defaulted = false, warning = '';

  if (provider === 'Trans') {
    if (p.includes('graded'))               { rate = 0.98; }
    else if (p.includes('iul'))             { rate = 1.25; }
    else if (p)                             { rate = 1.35; }
    else                                    { rate = 1.35; defaulted = true; warning = 'No product type — defaulted FE Express 135%'; }
  }
  else if (provider === 'Ethos') {
    if (p.includes('giwl'))                 { rate = 0.28; }
    else if (p.includes('81') || p.includes('85')) { rate = 0.67; }
    else if (p.includes('60') || p.includes('80')) { rate = 1.18; }
    else if (p.includes('18') || p.includes('59')) { rate = 0.67; }
    else if (p)                             { rate = 1.18; }
    else                                    { rate = 1.18; defaulted = true; warning = 'No product type — defaulted Trustage 60-80 118%'; }
  }
  else if (provider === 'Mutual') {
    if (p.includes('iul'))                  { rate = 1.30; }
    else if (p.includes('child') || p.includes('cwl')) { rate = 1.02; }
    else if (p.includes('graded'))          { rate = 0.85; }
    else if (p.includes('81') || p.includes('85')) { rate = 0.85; }
    else if (p.includes('level') || p.includes('lp') || p.includes('living')) { rate = 1.25; }
    else if (p)                             { rate = 1.25; }
    else                                    { rate = 1.25; defaulted = true; warning = 'No product type — defaulted LP Level 125%'; }
  }
  else if (provider === 'Balt')             { rate = 1.35; }
  else if (provider === 'Core') {
    if (p.includes('giwl'))                 { rate = 0.80; }
    else if (p.includes('max'))             { rate = 1.32; }
    else if (p.includes('siwl'))            { rate = 0.92; }
    else if (p)                             { rate = 0.92; }
    else                                    { rate = 0.80; defaulted = true; warning = 'No product type — defaulted GIWL 80%'; }
  }
  return { rate, defaulted, warning };
}

function addMonthsToDate(date, months) {
  const d = new Date(date);
  d.setMonth(d.getMonth() + months);
  return toBusinessDay(d);
}

function processRows(rows) {
  const C = CONFIG.COLUMNS;
  const apMap = {}, payoutsMap = {}, renewalsMap = {};

  for (const row of rows) {
    const provider = normalizeProvider(row[C.provider]);
    if (!provider) continue;
    const effDate = parseDate(row[C.effectiveDate]);
    if (!effDate) continue;
    const premium = cleanPremium(row[C.annualPremium]);
    if (premium <= 0) continue;

    const productRaw = (row[C.productType] || '').trim();
    const dobRaw     = (row[C.dateOfBirth]  || '').trim();
    const agent      = row[C.agentName]     || '—';
    const polNum     = row[C.policyNumber]  || '—';

    // Override carrier by policy number format if unambiguous
    const { provider: finalProvider, corrected } = overrideProviderByPolicy(polNum, provider);

    const days = finalProvider === 'Trans'  ? CONFIG.TRANS_DAYS
               : finalProvider === 'Ethos'  ? CONFIG.ETHOS_DAYS
               : finalProvider === 'Mutual' ? CONFIG.MUTUAL_DAYS
               : finalProvider === 'Core'   ? CONFIG.COREBRIDGE_DAYS
               : CONFIG.BALT_DAYS;

    let payDate;
    if (finalProvider === 'Balt') payDate = toNextWedSat(addDays(effDate, days));
    else payDate = toBusinessDay(addDays(effDate, days));
    const payKey = dateKey(payDate);

    // AP map
    if (!apMap[payKey]) apMap[payKey] = {};
    if (!apMap[payKey][finalProvider]) apMap[payKey][finalProvider] = { total:0, count:0, policies:[] };
    apMap[payKey][finalProvider].total += premium;
    apMap[payKey][finalProvider].count++;
    apMap[payKey][finalProvider].policies.push({ agent, policy:polNum, premium, provider:finalProvider, corrected });

    // Commission
    const { rate, defaulted, warning } = getCarrierRate(finalProvider, productRaw);
    const advComm = Math.round(premium * rate * CONFIG.ADVANCE_RATE * CONFIG.CHARGEBACK * 100) / 100;
    const renComm = Math.round(premium * rate * CONFIG.RENEWAL_RATE * CONFIG.CHARGEBACK * 100) / 100;
    const polDetail = { agent, policy:polNum, premium, provider:finalProvider, productRaw, rate, defaulted, warning, corrected };

    // Payouts map
    if (!payoutsMap[payKey]) payoutsMap[payKey] = {};
    if (!payoutsMap[payKey][finalProvider]) payoutsMap[payKey][finalProvider] = { total:0, count:0, policies:[] };
    payoutsMap[payKey][finalProvider].total += advComm;
    payoutsMap[payKey][finalProvider].count++;
    payoutsMap[payKey][finalProvider].policies.push({ ...polDetail, commission:advComm, type:'advance' });

    // Renewals map
    const renewDate = addMonthsToDate(payDate, CONFIG.RENEWAL_MONTHS);
    const renewKey  = dateKey(renewDate);
    if (!renewalsMap[renewKey]) renewalsMap[renewKey] = {};
    if (!renewalsMap[renewKey][finalProvider]) renewalsMap[renewKey][finalProvider] = { total:0, count:0, policies:[] };
    renewalsMap[renewKey][finalProvider].total += renComm;
    renewalsMap[renewKey][finalProvider].count++;
    renewalsMap[renewKey][finalProvider].policies.push({ ...polDetail, commission:renComm, type:'renewal' });
  }

  for (const map of [apMap, payoutsMap, renewalsMap]) {
    for (const day of Object.values(map)) {
      for (const p of Object.values(day)) p.total = Math.round(p.total * 100) / 100;
    }
  }
  return { apMap, payoutsMap, renewalsMap };
}

// ─── GOOGLE SHEET FETCH ───────────────────────────
async function fetchSheetData() {
  const url = CONFIG.SHEET_URL;
  if (!url || url === 'YOUR_GOOGLE_SHEET_CSV_URL_HERE') {
    return { error: 'setup' };
  }
  try {
    const res = await fetch(url + (url.includes('?') ? '&' : '?') + 'cachebust=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    const rows = parseCSV(text);
    return { rows };
  } catch (e) {
    return { error: e.message };
  }
}

function parseCSV(text) {
  const lines = text.split(/\r?\n/).filter(l => l.trim());
  if (lines.length < 2) return [];
  const headers = splitCSVLine(lines[0]);
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const vals = splitCSVLine(lines[i]);
    const obj = {};
    headers.forEach((h, idx) => { obj[h.trim()] = (vals[idx] || '').trim(); });
    rows.push(obj);
  }
  return rows;
}

function splitCSVLine(line) {
  const result = [];
  let cur = '', inQuote = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { inQuote = !inQuote; }
    else if (ch === ',' && !inQuote) { result.push(cur); cur = ''; }
    else { cur += ch; }
  }
  result.push(cur);
  return result;
}

// ─── CALENDAR STATE ───────────────────────────────
let calYear, calMonth;
let currentDetailKey = null, currentDetailDay = null;
let paymentData = {};   // active map (changes with tab)
let apData = {}, payoutsData = {}, renewalsData = {};
let currentMainTab = 'ap';

function initCalendar() {
  const now = new Date();
  calYear = now.getFullYear();
  calMonth = now.getMonth();
}

// ─── RENDER ───────────────────────────────────────
function renderSummary() {
  let tT=0,eT=0,mT=0,bT=0,cT=0,tC=0,eC=0,mC=0,bC=0,cC=0;
  for (const day of Object.values(paymentData)) {
    if (day.Trans)  { tT += day.Trans.total;  tC += day.Trans.count;  }
    if (day.Ethos)  { eT += day.Ethos.total;  eC += day.Ethos.count;  }
    if (day.Mutual) { mT += day.Mutual.total; mC += day.Mutual.count; }
    if (day.Balt)   { bT += day.Balt.total;   bC += day.Balt.count;   }
    if (day.Core)   { cT += day.Core.total;   cC += day.Core.count;   }
  }
  const total = tT+eT+mT+bT+cT;
  const isAP = currentMainTab === 'ap';
  const isRen = currentMainTab === 'renewals';
  const totalLabel = isAP ? 'Total AP projected' : isRen ? 'Total renewals (+10 mo)' : 'Total advance commissions';
  const subLabel = (days) => isAP ? `eff +${days} days` : isRen ? `AP × rate × 0.25 × 0.80` : `AP × rate × 0.75 × 0.80`;
  return `
    <div class="summary-grid" style="grid-template-columns:repeat(6,1fr);margin-bottom:20px">
      <div class="card total">
        <div class="card-label">${totalLabel}</div>
        <div class="card-value">${fmt(total)}</div>
        <div class="card-sub">${tC+eC+mC+bC+cC} policies · all carriers</div>
      </div>
      <div class="card trans">
        <div class="card-label">Transamerica</div>
        <div class="card-value">${fmt(tT)}</div>

function renderMonthly() {
  const months = {};
  for (const [key, day] of Object.entries(paymentData)) {
    const [y,m] = key.split('-');
    const mk = `${y}-${m}`;
    if (!months[mk]) months[mk] = {Trans:0,Ethos:0,Mutual:0,Balt:0,Core:0};
    if (day.Trans)  months[mk].Trans  += day.Trans.total;
    if (day.Ethos)  months[mk].Ethos  += day.Ethos.total;
    if (day.Mutual) months[mk].Mutual += day.Mutual.total;
    if (day.Balt)   months[mk].Balt   += day.Balt.total;
    if (day.Core)   months[mk].Core   += day.Core.total;
  }
  const sorted = Object.keys(months).sort();
  if (!sorted.length) return '';
  const MN = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const isAP = currentMainTab === 'ap';
  const isRen = currentMainTab === 'renewals';
  const heading = isAP ? 'Monthly Breakdown — Annual Premiums by Carrier'
                : isRen ? 'Monthly Breakdown — Renewal Commissions by Carrier (+10 months)'
                : 'Monthly Breakdown — Advance Commissions by Carrier';
  let gT=0,gE=0,gM=0,gB=0,gC=0, rows='';
  for (const mk of sorted) {
    const [y,m] = mk.split('-');
    const d = months[mk];
    const rt = d.Trans+d.Ethos+d.Mutual+d.Balt+d.Core;
    gT+=d.Trans;gE+=d.Ethos;gM+=d.Mutual;gB+=d.Balt;gC+=d.Core;
    rows+=`<tr>
      <td>${MN[+m-1]} ${y}</td>
      <td style="color:var(--trans-text)">${d.Trans>0?fmt(d.Trans):'—'}</td>
      <td style="color:var(--ethos-text)">${d.Ethos>0?fmt(d.Ethos):'—'}</td>
      <td style="color:var(--mutual-text)">${d.Mutual>0?fmt(d.Mutual):'—'}</td>
      <td style="color:var(--balt-text)">${d.Balt>0?fmt(d.Balt):'—'}</td>
      <td style="color:var(--core-text)">${d.Core>0?fmt(d.Core):'—'}</td>
      <td style="color:#a5b4fc;font-weight:600">${fmt(rt)}</td>
    </tr>`;
  }
  return `
    <div class="monthly-section">
      <h3>${heading}</h3>
      <div style="overflow-x:auto">
        <table class="monthly-table">
          <thead><tr>
            <th>Month</th>
            <th style="color:var(--trans-text)">Transamerica</th>
            <th style="color:var(--ethos-text)">Ethos</th>
            <th style="color:var(--mutual-text)">Mutual</th>
            <th style="color:var(--balt-text)">Baltimore</th>
            <th style="color:var(--core-text)">Corebridge</th>
            <th style="color:#a5b4fc">Total</th>
          </tr></thead>
          <tbody>${rows}</tbody>
          <tfoot><tr class="total-row">
            <td>Grand Total</td>
            <td>${fmt(gT)}</td><td>${fmt(gE)}</td><td>${fmt(gM)}</td>
            <td>${fmt(gB)}</td><td>${fmt(gC)}</td>
            <td>${fmt(gT+gE+gM+gB+gC)}</td>
          </tr></tfoot>
        </table>
      </div>
    </div>`;
}

function renderCalendar() {
  const today = new Date();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const firstDow = new Date(calYear, calMonth, 1).getDay();
  const prevMonthDays = new Date(calYear, calMonth, 0).getDate();

  let html = `
    <div class="cal-nav">
      <div class="cal-title">${MONTHS[calMonth]} ${calYear}</div>
      <div class="nav-controls">
        ${currentMainTab === 'payouts' ? `
        <div style="position:relative;display:flex;align-items:center">
          <input type="text" id="policy-search" placeholder="Search policy #..." oninput="searchPolicy(this.value)" onkeydown="if(event.key==='Escape'){this.value='';clearSearch()}" style="padding:5px 30px 5px 10px;border:0.5px solid var(--border2);border-radius:var(--border-radius-md);background:var(--surface2);color:var(--text);font-size:12px;font-family:'DM Sans',sans-serif;width:160px;outline:none">
          <span id="search-clear" onclick="document.getElementById('policy-search').value='';clearSearch()" style="display:none;position:absolute;right:8px;cursor:pointer;color:var(--muted);font-size:14px;line-height:1">✕</span>
        </div>` : ''}
        <button class="today-btn" onclick="goToday()">Today</button>
        <button class="today-btn" onclick="toggleRangePicker()" id="range-btn">📊 Range</button>
        <button class="nav-btn" onclick="prevMonth()">←</button>
        <button class="nav-btn" onclick="nextMonth()">→</button>
      </div>
    </div>
    ${currentMainTab === 'payouts' ? `<div id="search-results" style="display:none;background:var(--surface);border:1px solid var(--border2);border-radius:var(--border-radius-lg);padding:14px 16px;margin-bottom:14px"></div>` : ''}

    <div id="range-panel" style="display:none;background:var(--surface);border:1px solid var(--border2);border-radius:var(--border-radius-lg);padding:20px;margin-bottom:16px">
      <div style="display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;margin-bottom:16px">
        <div>
          <div style="font-size:11px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em">Quick Range</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            <button class="range-quick-btn" onclick="setQuickRange('mtd')">Month to Date</button>
            <button class="range-quick-btn" onclick="setQuickRange('thismonth')">Full Month</button>
            <button class="range-quick-btn" onclick="setQuickRange('next7')">Next 7 Days</button>
            <button class="range-quick-btn" onclick="setQuickRange('next30')">Next 30 Days</button>
            <button class="range-quick-btn" onclick="setQuickRange('all')">All Time</button>
          </div>
        </div>
        <div>
          <div style="font-size:11px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em">Custom Range</div>
          <div style="display:flex;gap:8px;align-items:center">
            <input type="date" id="range-start" style="background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:6px 10px;color:var(--text);font-size:13px;font-family:inherit">
            <span style="color:var(--muted);font-size:13px">to</span>
            <input type="date" id="range-end" style="background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:6px 10px;color:var(--text);font-size:13px;font-family:inherit">
            <button class="nav-btn" onclick="applyCustomRange()">Apply</button>
          </div>
        </div>
      </div>
      <div id="range-results" style="display:none">
        <div style="font-size:12px;color:var(--muted);margin-bottom:10px" id="range-label"></div>
        <div id="range-cards" style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:14px"></div>
        <div style="overflow-x:auto">
          <table style="width:100%;border-collapse:collapse;font-size:12px;min-width:500px">
            <thead><tr>
              <th style="text-align:left;padding:6px 10px;color:var(--muted);font-weight:500;border-bottom:1px solid var(--border2)">Payment Date</th>
              <th style="text-align:left;padding:6px 10px;color:var(--muted);font-weight:500;border-bottom:1px solid var(--border2)">Carrier</th>
              <th style="text-align:left;padding:6px 10px;color:var(--muted);font-weight:500;border-bottom:1px solid var(--border2)">Policies</th>
              <th style="text-align:right;padding:6px 10px;color:var(--muted);font-weight:500;border-bottom:1px solid var(--border2)">AP Total</th>
            </tr></thead>
            <tbody id="range-tbody"></tbody>
            <tfoot id="range-tfoot"></tfoot>
          </table>
        </div>
      </div>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--trans)"></div>Transamerica (eff +5 days)</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--ethos)"></div>Ethos / Trustage (eff +9 days)</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--mutual)"></div>Mutual of Omaha (eff +8 days)</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--balt)"></div>Baltimore Life (eff +7 → Wed/Sat)</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--core)"></div>Corebridge (eff +14 days)</div>
    </div>
    <div class="day-headers">
      ${DAYS_SHORT.map(d => `<div class="day-header">${d}</div>`).join('')}
    </div>
    <div class="cal-grid" id="cal-grid">`;

  let weekHtml = '<div class="cal-week">';
  let cellCount = 0;

  // Prev month filler cells
  for (let i = 0; i < firstDow; i++) {
    weekHtml += `<div class="cal-cell other-month"><div class="cell-date">${prevMonthDays - firstDow + 1 + i}</div></div>`;
    cellCount++;
  }

  // Current month
  for (let d = 1; d <= daysInMonth; d++) {
    const key = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayData = paymentData[key];
    const isToday = today.getFullYear() === calYear && today.getMonth() === calMonth && today.getDate() === d;
    const dow = new Date(calYear, calMonth, d).getDay();
    const isWeekend = dow === 0 || dow === 6;
    const hasPayment = !!dayData;
    const isShifted = hasPayment && ((dayData.Trans && dayData.Trans.shifted) || (dayData.Ethos && dayData.Ethos.shifted));

    let cls = 'cal-cell';
    if (isWeekend) cls += ' weekend';
    if (isToday) cls += ' today';
    if (hasPayment) cls += ' has-payment';

    const onclick = hasPayment ? `onclick="showDetail('${key}', ${d})"` : '';

    let innerHtml = `<div class="cell-date">
      <span>${d}</span>
      ${isToday ? '<span class="today-badge">TODAY</span>' : ''}
      ${isShifted && !isToday ? '<span class="shifted-indicator"></span>' : ''}
    </div>`;

    if (dayData) {
      if (dayData.Trans) {
        const lbl = dayData.Trans.count > 1
          ? `T: ${fmt(dayData.Trans.total)} (${dayData.Trans.count})`
          : `T: ${fmt(dayData.Trans.total)}`;
        innerHtml += `<div class="pill pill-trans">${lbl}</div>`;
      }
      if (dayData.Ethos) {
        const lbl = dayData.Ethos.count > 1
          ? `E: ${fmt(dayData.Ethos.total)} (${dayData.Ethos.count})`
          : `E: ${fmt(dayData.Ethos.total)}`;
        innerHtml += `<div class="pill pill-ethos">${lbl}</div>`;
      }
      if (dayData.Mutual) {
        const lbl = dayData.Mutual.count > 1
          ? `M: ${fmt(dayData.Mutual.total)} (${dayData.Mutual.count})`
          : `M: ${fmt(dayData.Mutual.total)}`;
        innerHtml += `<div class="pill pill-mutual">${lbl}</div>`;
      }
      if (dayData.Balt) {
        const lbl = dayData.Balt.count > 1
          ? `B: ${fmt(dayData.Balt.total)} (${dayData.Balt.count})`
          : `B: ${fmt(dayData.Balt.total)}`;
        innerHtml += `<div class="pill pill-balt">${lbl}</div>`;
      }
      if (dayData.Core) {
        const lbl = dayData.Core.count > 1
          ? `CB: ${fmt(dayData.Core.total)} (${dayData.Core.count})`
          : `CB: ${fmt(dayData.Core.total)}`;
        innerHtml += `<div class="pill pill-core">${lbl}</div>`;
      }
    }

    weekHtml += `<div class="${cls}" ${onclick}>${innerHtml}</div>`;
    cellCount++;

    if (cellCount % 7 === 0 && d < daysInMonth) {
      html += weekHtml + '</div>';
      weekHtml = '<div class="cal-week">';
    }
  }

  // Next month filler
  const remaining = 7 - (cellCount % 7 === 0 ? 7 : cellCount % 7);
  if (remaining < 7) {
    for (let i = 1; i <= remaining; i++) {
      weekHtml += `<div class="cal-cell other-month"><div class="cell-date">${i}</div></div>`;
    }
  }
  html += weekHtml + '</div></div>';
  return html;
}

function switchMainTab(tab) {
  currentMainTab = tab;
  paymentData = tab === 'ap' ? apData : tab === 'payouts' ? payoutsData : renewalsData;
  ['ap','payouts','renewals'].forEach(t => {
    $('tab-'+t).classList.toggle('active', t === tab);
  });
  // Show bank card only on payouts tab
  const bankCard = $('bank-card');
  if (bankCard) bankCard.style.display = tab === 'payouts' ? 'flex' : 'none';
  $('detail-panel').classList.remove('open');
  renderApp();
}

function renderApp() {
  $('app-content').innerHTML = `<div style="padding:24px 24px 0">${renderSummary()}</div>
    <div style="padding:0 24px">${renderMonthly()}</div>
    <div style="padding:0 24px">${renderCalendar()}</div>`;
}

// ─── DETAIL PANEL ────────────────────────────────
function showDetail(key, day) {
  currentDetailKey = key;
  currentDetailDay = day;
  const d = paymentData[key];
  if (!d) return;

  const [y, m] = key.split('-').map(Number);
  $('detail-title').textContent = `${MONTHS[m-1]} ${day}, ${y}`;

  const tTotal = d.Trans  ? d.Trans.total  : 0;
  const eTotal = d.Ethos  ? d.Ethos.total  : 0;
  const mTotal = d.Mutual ? d.Mutual.total : 0;
  const bTotal = d.Balt   ? d.Balt.total   : 0;
  const cTotal = d.Core   ? d.Core.total   : 0;
  const combined = tTotal + eTotal + mTotal + bTotal + cTotal;
  const isShifted = (d.Trans&&d.Trans.shifted)||(d.Ethos&&d.Ethos.shifted)||(d.Mutual&&d.Mutual.shifted)||(d.Balt&&d.Balt.shifted)||(d.Core&&d.Core.shifted);
  $('detail-subtitle').textContent = `${(d.Trans?d.Trans.count:0)+(d.Ethos?d.Ethos.count:0)+(d.Mutual?d.Mutual.count:0)+(d.Balt?d.Balt.count:0)+(d.Core?d.Core.count:0)} policies · ${fmt(combined)} total`;
  const shiftedBanner = $('shifted-banner');
  if (shiftedBanner) shiftedBanner.style.display = isShifted ? 'flex' : 'none';

  let cards = '';
  if (d.Trans) {
    cards += `<div class="detail-card trans"><div class="dc-label trans">Transamerica</div><div class="dc-amount trans">${fmt(tTotal)}</div><div class="dc-count">${d.Trans.count} polic${d.Trans.count > 1 ? 'ies' : 'y'}</div></div>`;
  }
  if (d.Ethos) {
    cards += `<div class="detail-card ethos"><div class="dc-label ethos">Ethos / Trustage</div><div class="dc-amount ethos">${fmt(eTotal)}</div><div class="dc-count">${d.Ethos.count} polic${d.Ethos.count > 1 ? 'ies' : 'y'}</div></div>`;
  }
  if (d.Mutual) {
    cards += `<div class="detail-card mutual"><div class="dc-label mutual">Mutual of Omaha</div><div class="dc-amount mutual">${fmt(mTotal)}</div><div class="dc-count">${d.Mutual.count} polic${d.Mutual.count > 1 ? 'ies' : 'y'}</div></div>`;
  }
  if (d.Balt) {
    cards += `<div class="detail-card balt"><div class="dc-label balt">Baltimore Life</div><div class="dc-amount balt">${fmt(bTotal)}</div><div class="dc-count">${d.Balt.count} polic${d.Balt.count > 1 ? 'ies' : 'y'}</div></div>`;
  }
  if (d.Core) {
    cards += `<div class="detail-card core"><div class="dc-label core">Corebridge</div><div class="dc-amount core">${fmt(cTotal)}</div><div class="dc-count">${d.Core.count} polic${d.Core.count > 1 ? 'ies' : 'y'}</div></div>`;
  }
  const numCarriers = (d.Trans?1:0)+(d.Ethos?1:0)+(d.Mutual?1:0)+(d.Balt?1:0)+(d.Core?1:0);
  if (numCarriers > 1) {
    cards += `<div class="detail-card combined"><div class="dc-label combined">Combined</div><div class="dc-amount combined">${fmt(combined)}</div><div class="dc-count">all policies</div></div>`;
  }
  $('detail-cards').innerHTML = cards;

  const isAP  = currentMainTab === 'ap';
  const isRen = currentMainTab === 'renewals';
  const isPay = currentMainTab === 'payouts';

  // Update table headers based on tab
  const thead = document.querySelector('#detail-panel thead tr');
  if (thead) {
    thead.innerHTML = isAP
      ? `<th>Agent</th><th>Policy #</th><th>Carrier</th><th style="text-align:right">Annual Premium</th>`
      : isPay
      ? `<th>Agent</th><th>Policy #</th><th>Product</th><th>Rate</th><th style="text-align:right">AP</th><th style="text-align:right">Advance Comm.</th><th>Status</th><th style="text-align:center">Toggle</th>`
      : `<th>Agent</th><th>Policy #</th><th>Product</th><th>Rate</th><th style="text-align:right">AP</th><th style="text-align:right">Renewal Comm.</th>`;
  }

  const allPols = [];
  let rows = '';
  const renderPolicies = (policies, prov) => {
    const badgeCls = prov==='Trans'?'badge-trans':prov==='Ethos'?'badge-ethos':prov==='Mutual'?'badge-mutual':prov==='Balt'?'badge-balt':'badge-core';
    const badgeLbl = prov==='Trans'?'Trans':prov==='Ethos'?'Ethos':prov==='Mutual'?'Mutual':prov==='Balt'?'Baltimore':'Corebridge';
    for (const p of policies) {
      allPols.push(p);
      const correctedFlag = p.corrected
        ? `<span class="tip-wrap"><span class="tip-icon fixed">↻ fixed</span><span class="tip-box fixed">Carrier corrected by policy number format</span></span>` : '';
      const warnIcon = p.defaulted
        ? `<span class="tip-wrap"><span class="tip-icon warn">⚠</span><span class="tip-box warn">${p.warning||'Rate was defaulted'}</span></span>` : '';

      if (isAP) {
        rows += `<tr><td>${p.agent}</td><td class="mono">${p.policy}${correctedFlag}</td><td><span class="badge ${badgeCls}">${badgeLbl}</span></td><td class="amount">${fmt(p.premium)}</td></tr>`;
      } else if (isPay) {
        const statusInfo = getStatus(p.policy);
        const st = statusInfo.status, stDate = fmtStatusDate(statusInfo.date);
        const rateStr = p.rate ? (p.rate*100).toFixed(0)+'%' : '—';
        const struck = st==='rapid'||st==='chargeback'||st==='cancelled';
        const commColor = st==='paid'?'#4ade80':st==='rapid'?'#fb923c':st==='chargeback'?'#f87171':st==='ipf'?'#facc15':st==='cancelled'?'var(--muted)':'#4ade80';
        const stLabel = st==='pending'?`<span style="font-size:11px;color:var(--muted)">—</span>`
          :st==='paid'?`<span style="font-size:11px;color:#4ade80">✓ Paid${stDate?`<br><span style="font-size:10px;color:var(--muted)">${stDate}</span>`:''}</span>`
          :st==='ipf'?`<span style="font-size:11px;color:#facc15">⚠ IPF${stDate?`<br><span style="font-size:10px;color:var(--muted)">${stDate}</span>`:''}</span>`
          :st==='rapid'?`<span style="font-size:11px;color:#fb923c">⚡ Rapid CB${stDate?`<br><span style="font-size:10px;color:var(--muted)">${stDate}</span>`:''}</span>`
          :st==='chargeback'?`<span style="font-size:11px;color:#f87171">✕ CB${stDate?`<br><span style="font-size:10px;color:var(--muted)">${stDate}</span>`:''}</span>`
          :`<span style="font-size:11px;color:var(--muted)">Cancelled${stDate?`<br><span style="font-size:10px;color:var(--muted)">${stDate}</span>`:''}</span>`;
        const impact = st==='ipf'?`<div class="impact-ipf">First payment failed — monitor · may still pay or rapid CB</div>`
          :st==='rapid'?`<div class="impact-rapid">Full advance from earnings · reserve reversed</div>`
          :st==='chargeback'?`<div class="impact-cb">${fmt(Math.round(p.commission*(0.25/0.75)*100)/100)} from reserve bank first</div>`:'';
        const polKey = p.policy.replace(/'/g,"\\'");
        const commStr = fmt(p.commission);
        const tog = `<div class="status-tog-group">
          <button class="status-tog ${st==='pending'?'tog-pending':''}" onclick="openStatusPopup('${polKey}','pending',null)">Pending</button>
          <button class="status-tog ${st==='paid'?'tog-paid':''}" onclick="openStatusPopup('${polKey}','paid',{comm:'${commStr}'})">✓ Paid</button>
          <button class="status-tog ${st==='ipf'?'tog-ipf':''}" onclick="openStatusPopup('${polKey}','ipf',{comm:'${commStr}'})">⚠ IPF</button>
          <button class="status-tog ${st==='rapid'?'tog-rapid':''}" onclick="openStatusPopup('${polKey}','rapid',{comm:'${commStr}'})">⚡ Rapid CB</button>
          <button class="status-tog ${st==='chargeback'?'tog-chargeback':''}" onclick="openStatusPopup('${polKey}','chargeback',{comm:'${commStr}'})">✕ CB</button>
          <button class="status-tog ${st==='cancelled'?'tog-cancelled':''}" onclick="openStatusPopup('${polKey}','cancelled',null)">Cancelled</button>
        </div>`;
        rows += `<tr>
          <td>${p.agent}</td>
          <td class="mono">${p.policy}${correctedFlag}</td>
          <td>${p.productRaw||'—'}${warnIcon}</td>
          <td style="color:var(--muted);font-size:11px">${rateStr}</td>
          <td class="amount" style="color:var(--muted)">${fmt(p.premium)}</td>
          <td><div class="amount" style="color:${commColor};${struck?'text-decoration:line-through;opacity:.6':''}">${fmt(p.commission)}</div>${impact}</td>
          <td style="min-width:80px">${stLabel}</td>
          <td style="text-align:center">${tog}</td>
        </tr>`;
      } else {
        const rateStr = p.rate ? (p.rate*100).toFixed(0)+'%' : '—';

function fmtDate(d) {
  return `${MONTHS[d.getMonth()].slice(0,3)} ${d.getDate()}, ${d.getFullYear()}`;
}

function dk(date) {
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
}

function setQuickRange(type) {
  const today = new Date();
  today.setHours(0,0,0,0);
  let start, end;

  if (type === 'mtd') {
    start = new Date(today.getFullYear(), today.getMonth(), 1);
    end = new Date(today);
  } else if (type === 'thismonth') {
    start = new Date(today.getFullYear(), today.getMonth(), 1);
    end = new Date(today.getFullYear(), today.getMonth()+1, 0);
  } else if (type === 'next7') {
    start = new Date(today);
    end = new Date(today); end.setDate(end.getDate() + 7);
  } else if (type === 'next30') {
    start = new Date(today);
    end = new Date(today); end.setDate(end.getDate() + 30);
  } else if (type === 'all') {
    const keys = Object.keys(paymentData).sort();
    if (!keys.length) return;
    start = new Date(keys[0]);
    end = new Date(keys[keys.length-1]);
  }

  document.querySelectorAll('.range-quick-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('range-start').value = dk(start);
  document.getElementById('range-end').value = dk(end);
  applyCustomRange();
}

function applyCustomRange() {
  const startVal = document.getElementById('range-start').value;
  const endVal   = document.getElementById('range-end').value;
  if (!startVal || !endVal) return;

  const start = new Date(startVal + 'T00:00:00');
  const end   = new Date(endVal   + 'T00:00:00');
  if (start > end) return;

  // Accumulate totals
  let tT=0,eT=0,mT=0,bT=0,cT=0,tC=0,eC=0,mC=0,bC=0,cC=0;
  const rows = [];

  const sorted = Object.keys(paymentData).sort();
  for (const key of sorted) {
    const d = new Date(key + 'T00:00:00');
    if (d < start || d > end) continue;
    const day = paymentData[key];
    const [y,mo,da] = key.split('-').map(Number);
    const dateLabel = `${MONTHS[mo-1].slice(0,3)} ${da}, ${y}`;

    for (const [prov, info] of Object.entries(day)) {
      if (prov === 'Trans')  { tT += info.total; tC += info.count; }
      if (prov === 'Ethos')  { eT += info.total; eC += info.count; }
      if (prov === 'Mutual') { mT += info.total; mC += info.count; }
      if (prov === 'Balt')   { bT += info.total; bC += info.count; }
      if (prov === 'Core')   { cT += info.total; cC += info.count; }
      const color = prov==='Trans'?'var(--trans-text)':prov==='Ethos'?'var(--ethos-text)':prov==='Mutual'?'var(--mutual-text)':prov==='Balt'?'var(--balt-text)':'var(--core-text)';
      const label = prov==='Trans'?'Transamerica':prov==='Ethos'?'Ethos/Trustage':prov==='Mutual'?'Mutual of Omaha':prov==='Balt'?'Baltimore Life':'Corebridge';
      rows.push({dateLabel, label, color, count: info.count, total: info.total});
    }
  }

  const grandTotal = tT + eT + mT + bT + cT;
  const grandCount = tC + eC + mC + bC + cC;

  // Range label
  document.getElementById('range-label').textContent =
    `${fmtDate(start)} → ${fmtDate(end)}  ·  ${grandCount} policies  ·  ${fmt(grandTotal)} total`;

  // Summary cards
  const cardData = [
    {label:'Total', val:grandTotal, count:grandCount, color:'#a5b4fc', border:'var(--accent)'},
    {label:'Transamerica', val:tT, count:tC, color:'var(--trans-text)', border:'var(--trans)'},
    {label:'Ethos/Trustage', val:eT, count:eC, color:'var(--ethos-text)', border:'var(--ethos)'},
    {label:'Mutual of Omaha', val:mT, count:mC, color:'var(--mutual-text)', border:'var(--mutual)'},
    {label:'Baltimore Life', val:bT, count:bC, color:'var(--balt-text)', border:'var(--balt)'},
    {label:'Corebridge', val:cT, count:cC, color:'var(--core-text)', border:'var(--core)'},
  ];
  document.getElementById('range-cards').style.gridTemplateColumns = 'repeat(6,1fr)';
  document.getElementById('range-cards').innerHTML = cardData.map(c => `
    <div style="background:var(--surface2);border:1px solid var(--border2);border-left:3px solid ${c.border};border-radius:var(--border-radius-md);padding:12px">
      <div style="font-size:11px;color:${c.color};margin-bottom:4px">${c.label}</div>

      <div style="font-size:11px;color:var(--muted);margin-top:2px">${c.count} polic${c.count!==1?'ies':'y'}</div>
    </div>`).join('');

  // Table rows
  document.getElementById('range-tbody').innerHTML = rows.map(r => `
    <tr style="border-bottom:1px solid var(--border)">
      <td style="padding:7px 10px;color:var(--text);font-size:12px">${r.dateLabel}</td>

const BANK_INITIAL = 9619.14;
const STORAGE_KEY = 'bwc_policy_statuses';
const SYNC_URL = 'https://script.google.com/macros/s/AKfycbw_kkP9apwtiSATbIo1e7GCqJtHeWBetDOt6yeHGwoRF1cUF1x0CeRuMuTLMg25OGvx/exec';
const policyStatuses = {};
let syncTimeout = null;

// ── Local storage (fast, per-device cache) ──
function loadStatusesFromStorage() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) Object.assign(policyStatuses, JSON.parse(saved));
  } catch(e) { console.warn('Could not load local statuses:', e); }
}

function saveStatusesToStorage() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(policyStatuses));
  } catch(e) { console.warn('Could not save local statuses:', e); }
}

// ── Google Sheets sync ──
async function loadStatusesFromSheet() {
  try {
    const res = await fetch(`${SYNC_URL}?action=read`, { method: 'GET', mode: 'cors' });
    const data = await res.json();
    if (data.ok && data.statuses) {
      console.log('SHEET STATUSES RECEIVED:', JSON.stringify(data.statuses).slice(0, 300));
      Object.assign(policyStatuses, data.statuses);
      saveStatusesToStorage();
    }
  } catch(e) {
    console.warn('Could not sync from sheet, using local cache:', e);
  }
}
async function saveStatusesToSheet() {
  try {
    // Use no-cors GET with encoded data to work on all browsers including iOS Safari
    const encoded = encodeURIComponent(JSON.stringify(policyStatuses));
    await fetch(`${SYNC_URL}?action=write&data=${encoded}`, {
      method: 'GET',
      mode: 'no-cors'
    });
  } catch(e) {
    console.warn('Could not sync to sheet:', e);
  }
}

// Debounced save — waits 1.5s after last change before syncing to sheet
function scheduleSyncToSheet() {
  saveStatusesToStorage(); // always save locally immediately
  if (syncTimeout) clearTimeout(syncTimeout);
  syncTimeout = setTimeout(() => {
    saveStatusesToSheet();
  }, 1500);
}

function getStatus(polNum) {
  return policyStatuses[polNum] || { status: 'pending', date: null };
}

function setStatusData(polNum, status, date) {
  policyStatuses[polNum] = { status, date };
  scheduleSyncToSheet();
}

function exportStatusCSV() {
  const rows = [['Policy Number','Status','Date Marked']];
  for (const [pol, info] of Object.entries(policyStatuses)) {
    if (info.status !== 'pending') rows.push([pol, info.status, info.date || '']);
  }
  if (rows.length === 1) { alert('No statuses marked yet — nothing to export.'); return; }
  const csv = rows.map(r => r.map(v => `"${v}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  const now = new Date();
  const todayStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
  a.download = `blackwing_statuses_${todayStr}.csv`;
  a.click();
}

function importStatusCSV(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const lines = e.target.result.split('\n').slice(1);
      let count = 0;
      for (const line of lines) {
        if (!line.trim()) continue;
        const [pol, status, date] = line.split(',').map(v => v.replace(/"/g,'').trim());
        if (pol && status) { policyStatuses[pol] = { status, date: date||null }; count++; }
      }
      scheduleSyncToSheet();
      alert(`✓ Imported ${count} statuses.`);
      if (currentDetailKey) showDetail(currentDetailKey, currentDetailDay);
    } catch(err) { alert('Import error: ' + err.message); }
  };
  reader.readAsText(file);
}

function updateBankFromPolicies(policies) {
  let used = 0;
  for (const p of policies) {
    const s = getStatus(p.policy);
    if (s.status === 'chargeback' || s.status === 'rapid') {
      const reserve = Math.round(p.premium * (p.rate || 1.35) * 0.25 * 0.80 * 100) / 100;
      used += reserve;
    }
  }
  used = Math.min(used, BANK_INITIAL);
  const remaining = BANK_INITIAL - used;
  const pct = Math.max(0, (remaining / BANK_INITIAL) * 100);
  const bankCard = document.getElementById('bank-card');
  if (bankCard) {
    document.getElementById('bank-amount').textContent = '$' + remaining.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2});
    document.getElementById('bank-bar').style.width = pct + '%';
    document.getElementById('bank-applied').textContent = used > 0 ? '−$' + used.toFixed(2) : '—';
    document.getElementById('bank-remaining').textContent = '$' + remaining.toFixed(2);
  }
}

// Format YYYY-MM-DD to "May 7, 2026" for display — safe on all browsers
function fmtStatusDate(dateStr) {
  if (!dateStr) return '';
  const MN = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const DN = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  // YYYY-MM-DD — format manually, no Date object, no timezone risk
  if (/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) {
    const [y, m, d] = dateStr.split('-').map(Number);
    // Get weekday without timezone shift
    const dow = new Date(y, m - 1, d).getDay();
    return `${DN[dow]} ${MN[m-1]} ${d}, ${y}`;
  }
  // Long format with GMT — extract parts directly from string
  if (dateStr.includes('GMT')) {
    const match = dateStr.match(/(\w{3})\s+(\w{3})\s+(\d{2})\s+(\d{4})/);
    if (match) return `${match[1]} ${match[2]} ${parseInt(match[3])}, ${match[4]}`;
  }
  // Already clean — return as-is
  return dateStr;
}

// Parse a stored date string safely — handles both YYYY-MM-DD and legacy "May 7, 2026"
function parseSavedDate(dateStr) {
  if (!dateStr) return null;
  // YYYY-MM-DD (new standard) — parse as LOCAL date not UTC
  if (/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) {
    const [y, m, d] = dateStr.split('-').map(Number);
    return new Date(y, m - 1, d); // no time = local midnight, no timezone shift
  }
  // Long format "Wed May 06 2026 20:00:00 GMT..." — extract date parts
  if (dateStr.includes('GMT') || dateStr.length > 20) {
    try {
      const match = dateStr.match(/(\w{3})\s+(\d{1,2})\s+(\d{4})/);
      if (match) {
        const MONTHS = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
        const mon = MONTHS[match[1]];
        const day = parseInt(match[2]);
        const year = parseInt(match[3]);
        if (mon !== undefined && day && year) return new Date(year, mon, day);
      }
    } catch(e) {}
  }
  // Legacy "May 7, 2026" format
  const MONTHS = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  const match = dateStr.match(/(\w{3,})\s+(\d{1,2}),?\s+(\d{4})/);
  if (match) {
    const mon = MONTHS[match[1].slice(0,3)];
    const day = parseInt(match[2]);
    const year = parseInt(match[3]);
    if (mon !== undefined && day && year) return new Date(year, mon, day);
  }
  return null;
}
function getCalcTotals(dayKey) {
  const dayData = payoutsData[dayKey];
  let expectedToday = 0, collectedToday = 0, collectedPrior = 0, paidEarly = 0;
  let expectedCount = 0, collectedTodayCount = 0, collectedPriorCount = 0, paidEarlyCount = 0;

  const scheduledDate = new Date(dayKey + 'T00:00:00');

  // Policies scheduled FOR this day
  if (dayData) {
    for (const provData of Object.values(dayData)) {
      for (const p of provData.policies) {
        const s = getStatus(p.policy);
        const st = s.status;
        const paidDateObj = parseSavedDate(s.date);

        if (st === 'pending' || st === 'ipf') {
          expectedToday += p.commission;
          expectedCount++;
        } else if (st === 'paid') {
          if (paidDateObj && paidDateObj < scheduledDate) {
            collectedPrior += p.commission;
            collectedPriorCount++;
          } else {
            collectedToday += p.commission;
            collectedTodayCount++;
          }
        }
      }
    }
  }

  // Paid Early — policies scheduled for FUTURE days but paid date matches this day
  for (const [futureKey, futureDay] of Object.entries(payoutsData)) {
    if (futureKey <= dayKey) continue;
    for (const provData of Object.values(futureDay)) {
      for (const p of provData.policies) {
        const s = getStatus(p.policy);
        if (s.status !== 'paid' || !s.date) continue;
        const paidDateObj = parseSavedDate(s.date);
        if (!paidDateObj) continue;
        // Convert paid date back to YYYY-MM-DD key for comparison
        const paidDayKey = `${paidDateObj.getFullYear()}-${String(paidDateObj.getMonth()+1).padStart(2,'0')}-${String(paidDateObj.getDate()).padStart(2,'0')}`;
        if (paidDayKey === dayKey) {
          paidEarly += p.commission;
          paidEarlyCount++;
        }
      }
    }
  }

  return { expectedToday, collectedToday, collectedPrior, paidEarly, expectedCount, collectedTodayCount, collectedPriorCount, paidEarlyCount };
}

function renderCalcStrip(dayKey) {
  const strip = document.getElementById('calc-strip');
  if (!strip) return;
  if (currentMainTab !== 'payouts') { strip.style.display = 'none'; return; }

  const { expectedToday, collectedToday, collectedPrior, paidEarly, expectedCount, collectedTodayCount, collectedPriorCount, paidEarlyCount } = getCalcTotals(dayKey);

  strip.style.display = 'flex';
  strip.innerHTML = `
    <div class="calc-card cc-expected">
      <div class="cc-lbl">Expected today</div>
      <div class="cc-val">${expectedToday > 0 ? fmt(expectedToday) : '$0.00'}</div>
      <div class="cc-sub">${expectedCount} pending</div>
    </div>
    <div class="calc-card cc-prior">

      <div class="cc-val">${collectedPrior > 0 ? fmt(collectedPrior) : '$0.00'}</div>
      <div class="cc-sub">${collectedPriorCount > 0 ? `${collectedPriorCount} paid early` : 'none yet'}</div>
    </div>
    <div class="calc-card cc-today">
      <div class="cc-lbl">Collected today</div>
      <div class="cc-val">${collectedToday > 0 ? fmt(collectedToday) : '$0.00'}</div>
      <div class="cc-sub">${collectedTodayCount > 0 ? `${collectedTodayCount} paid` : 'none yet'}</div>
    </div>
    <div class="calc-card" style="background:rgba(234,179,8,.08);border:0.5px solid rgba(234,179,8,.25)">
      <div class="cc-lbl" style="color:#facc15">Paid early</div>
      <div class="cc-val" style="color:#facc15">${paidEarly > 0 ? fmt(paidEarly) : '$0.00'}</div>
      <div class="cc-sub" style="color:#facc15;opacity:.75">${paidEarlyCount > 0 ? `${paidEarlyCount} future polic${paidEarlyCount > 1 ? 'ies' : 'y'}` : 'none'}</div>
    </div>`;
}

// ─── POLICY SEARCH ───────────────────────────────
function searchPolicy(query) {
  const q = query.trim().toUpperCase();
  const clearBtn = document.getElementById('search-clear');
  const resultsEl = document.getElementById('search-results');

  if (clearBtn) clearBtn.style.display = q ? 'block' : 'none';

  if (!q || q.length < 2) {
    if (resultsEl) resultsEl.style.display = 'none';
    return;
  }

  // Search payouts tab only
  const found = [];
  for (const [dateKey, day] of Object.entries(payoutsData)) {
    for (const provData of Object.values(day)) {
      for (const p of provData.policies) {
        if (p.policy && p.policy.toUpperCase().includes(q)) {
          if (!found.find(f => f.dateKey === dateKey)) {
            found.push({
              dateKey,
              agent: p.agent || '—',
              policy: p.policy,
              provider: p.provider,
              commission: p.commission
            });
          }
        }
      }
    }
  }

  if (!resultsEl) return;

  if (found.length === 0) {
    resultsEl.style.display = 'block';
    resultsEl.innerHTML = `<div style="font-size:13px;color:var(--muted)">No policies matching "<strong style="color:var(--text)">${query}</strong>"</div>`;
    return;
  }

  found.sort((a, b) => a.dateKey.localeCompare(b.dateKey));

  const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const provColors = { Trans:'#f87171', Ethos:'#4ade80', Mutual:'#60a5fa', Balt:'#f472b6', Core:'#fb923c' };

  resultsEl.style.display = 'block';
  resultsEl.innerHTML = `
    <div style="font-size:11px;color:var(--muted);margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em">${found.length} result${found.length > 1 ? 's' : ''} for "${query}" — Effective Payouts</div>
    ${found.map(r => {
      const [y, m, d] = r.dateKey.split('-').map(Number);
      const dateLabel = `${MONTHS_SHORT[m-1]} ${d}, ${y}`;
      const col = provColors[r.provider] || '#888';
      const statusInfo = getStatus(r.policy);
      const st = statusInfo.status;
      const stBadge = st !== 'pending'
        ? `<span style="font-size:10px;padding:1px 6px;border-radius:3px;margin-left:6px;background:${st==='paid'?'rgba(22,163,74,.15)':st==='ipf'?'rgba(234,179,8,.15)':st==='rapid'?'rgba(251,146,60,.15)':st==='chargeback'?'rgba(220,38,38,.12)':'rgba(107,114,128,.1)'};color:${st==='paid'?'#4ade80':st==='ipf'?'#facc15':st==='rapid'?'#fb923c':st==='chargeback'?'#f87171':'var(--muted)'}">${st==='paid'?'✓ Paid':st==='ipf'?'⚠ IPF':st==='rapid'?'⚡ Rapid CB':st==='chargeback'?'✕ CB':'Cancelled'}</span>`
        : '';
      return `<div onclick="jumpToDate('${r.dateKey}')" style="display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-radius:var(--border-radius-md);cursor:pointer;border:0.5px solid var(--border);margin-bottom:5px;background:var(--surface2)" onmouseover="this.style.borderColor='var(--border2)'" onmouseout="this.style.borderColor='var(--border)'">
        <div>
          <span style="font-family:var(--font-mono);font-size:12px;color:var(--text)">${r.policy}</span>
          ${stBadge}
          <div style="font-size:11px;color:var(--muted);margin-top:2px">${r.agent} · <span style="color:${col}">${r.provider}</span></div>
        </div>
        <div style="text-align:right;flex-shrink:0;margin-left:12px">
          <div style="font-size:12px;font-weight:500;color:var(--text)">${dateLabel}</div>
          <div style="font-size:11px;color:var(--muted)">${r.commission ? fmt(r.commission) : '—'}</div>
        </div>
      </div>`;
    }).join('')}`;
}

function jumpToDate(dateKey) {
  // Always jump to Effective Payouts
  if (currentMainTab !== 'payouts') switchMainTab('payouts');

  // Navigate to correct month
  const [y, m] = dateKey.split('-').map(Number);
  calYear = y;
  calMonth = m - 1;
  renderApp();

  // Open detail panel after DOM updates
  requestAnimationFrame(() => {
    const day = parseInt(dateKey.split('-')[2]);
    showDetail(dateKey, day);
  });

  // Clear search
  const si = document.getElementById('policy-search');
  const sc = document.getElementById('search-clear');
  const sr = document.getElementById('search-results');
  if (si) si.value = '';
  if (sc) sc.style.display = 'none';
  if (sr) sr.style.display = 'none';
}

function clearSearch() {
  const r = document.getElementById('search-results');
  const c = document.getElementById('search-clear');
  if (r) r.style.display = 'none';
  if (c) c.style.display = 'none';
}

// ─── BOOT ────────────────────────────────────────
async function load() {
  setStatus('loading', 'Loading…');
  const result = await fetchSheetData();

  if (result.error === 'setup') {
    setStatus('error', 'Not connected');
    showSetupScreen();
    return;
  }
  if (result.error) {
    setStatus('error', 'Error loading data');
    $('app-content').innerHTML = `
      <div class="state-overlay">
        <h2>Could not load data</h2>
        <p>Error: ${result.error}<br><br>Make sure your Google Sheet is published to the web as CSV and the URL in <code>config.js</code> is correct.</p>
      </div>`;
    return;
  }

  const result2 = processRows(result.rows);
  apData       = result2.apMap;
  payoutsData  = result2.payoutsMap;
  renewalsData = result2.renewalsMap;
  paymentData  = apData; // default tab is AP
  currentMainTab = 'ap';
  ['ap','payouts','renewals'].forEach(t => $('tab-'+t).classList.toggle('active', t==='ap'));
  setStatus('live', 'Live');
  setLastUpdated();
  renderApp();
}

// ONE-TIME CLEAR — wipe all existing statuses to start fresh
// Remove this block after first load
const CLEAR_KEY = 'bwc_cleared_v1';
if (!localStorage.getItem(CLEAR_KEY)) {
  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem('bwc_dates_fixed_v1');
  localStorage.removeItem('bwc_dates_fixed_v2');
  localStorage.setItem(CLEAR_KEY, '1');
  // Also clear the sheet
  fetch(`${SYNC_URL}?action=clearall`, { method: 'GET', mode: 'no-cors' });
}

loadStatusesFromStorage(); // load local cache immediately so UI is fast
initCalendar();           // start calendar with local data
// Then sync from sheet in background — updates UI when done
loadStatusesFromSheet().then(() => {
  if (currentDetailKey) showDetail(currentDetailKey, currentDetailDay);
  renderApp();
});
load();
// Auto-refresh
setInterval(load, CONFIG.REFRESH_INTERVAL);
</script>

  <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:5px">Date this occurred</label>

    <button id="sp-confirm" onclick="confirmStatusPopup()" style="padding:7px 14px;border-radius:var(--border-radius-md);border:none;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;font-weight:500"></button>
  </div>
</div>
